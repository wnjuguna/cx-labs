---
- name: Bootstrap kind local lab on macOS
  hosts: localhost
  connection: local
  gather_facts: true
  vars:
    kind_cluster_name: "cx-labs-kind-local"
    kubeconfig_path: "{{ lookup('env', 'HOME') }}/.kube/kind-local.yaml"
    tiny_telemetry_repo_url: "https://github.com/BigRedS/tiny-telemetry.git"
    tiny_telemetry_git_ref: "main"
    tiny_telemetry_cache_dir: "{{ playbook_dir }}/../.cache/tiny-telemetry"
    tiny_telemetry_image: "tiny-telemetry:local"
    log_generator_image: "log-generator:local"
  tasks:
    - name: Ensure this playbook runs only on macOS
      ansible.builtin.assert:
        that:
          - ansible_facts['os_family'] == "Darwin"
        fail_msg: "This local lab currently supports only macOS hosts."

    - name: Ensure required Homebrew formulae are installed
      community.general.homebrew:
        name:
          - kind
          - terraform
          - git
        state: present

    - name: Ensure Docker Desktop daemon is available
      ansible.builtin.command: docker info
      register: docker_info
      changed_when: false

    - name: Ensure kubeconfig directory exists
      ansible.builtin.file:
        path: "{{ kubeconfig_path | dirname }}"
        state: directory
        mode: "0700"

    - name: Ensure kind-local cache directory exists
      ansible.builtin.file:
        path: "{{ playbook_dir }}/../.cache"
        state: directory
        mode: "0755"

    - name: Ensure kind-local logs directory exists
      ansible.builtin.file:
        path: "{{ playbook_dir }}/../logs"
        state: directory
        mode: "0755"

    - name: Resolve absolute path to logs directory on host
      ansible.builtin.command:
        argv:
          - python3
          - -c
          - "import os,sys; print(os.path.realpath(os.path.join(sys.argv[1], '..', 'logs')))"
          - "{{ playbook_dir }}"
      register: logs_abs_cmd
      changed_when: false

    - name: Set logs_host_abs fact
      ansible.builtin.set_fact:
        logs_host_abs: "{{ logs_abs_cmd.stdout | trim }}"

    - name: Render kind cluster config with host logs mount
      ansible.builtin.template:
        src: kind-config.yaml.j2
        dest: "{{ playbook_dir }}/../.cache/kind-config.rendered.yaml"
        mode: "0644"

    - name: Ensure tiny-telemetry cache parent directory exists
      ansible.builtin.file:
        path: "{{ tiny_telemetry_cache_dir | dirname }}"
        state: directory
        mode: "0755"

    - name: Check if tiny-telemetry git checkout exists
      ansible.builtin.stat:
        path: "{{ tiny_telemetry_cache_dir }}/.git"
      register: tiny_telemetry_git

    - name: Clone tiny-telemetry repo into cache
      ansible.builtin.git:
        repo: "{{ tiny_telemetry_repo_url }}"
        dest: "{{ tiny_telemetry_cache_dir }}"
        version: "{{ tiny_telemetry_git_ref }}"
      when: not tiny_telemetry_git.stat.exists

    - name: Check if tiny-telemetry Docker image exists locally
      ansible.builtin.command: docker image inspect {{ tiny_telemetry_image }}
      register: tiny_telemetry_image_inspect
      changed_when: false
      failed_when: false

    - name: Build tiny-telemetry Docker image
      ansible.builtin.command: docker build -t {{ tiny_telemetry_image }} {{ tiny_telemetry_cache_dir }}
      when: tiny_telemetry_image_inspect.rc != 0

    - name: Check if log-generator Docker image exists locally
      ansible.builtin.command: docker image inspect {{ log_generator_image }}
      register: log_generator_image_inspect
      changed_when: false
      failed_when: false

    - name: Build log-generator Docker image
      ansible.builtin.command: docker build -t {{ log_generator_image }} {{ playbook_dir }}/../log-generator
      when: log_generator_image_inspect.rc != 0

    - name: List existing kind clusters
      ansible.builtin.command: kind get clusters
      register: kind_clusters
      changed_when: false
      failed_when: false

    - name: Create kind cluster if missing
      ansible.builtin.command: >-
        kind create cluster
        --name {{ kind_cluster_name }}
        --config {{ playbook_dir }}/../.cache/kind-config.rendered.yaml
        --kubeconfig {{ kubeconfig_path }}
      when: kind_cluster_name not in kind_clusters.stdout_lines

    - name: Load tiny-telemetry image into kind cluster
      ansible.builtin.command: >-
        kind load docker-image {{ tiny_telemetry_image }}
        --name {{ kind_cluster_name }}

    - name: Load log-generator image into kind cluster
      ansible.builtin.command: >-
        kind load docker-image {{ log_generator_image }}
        --name {{ kind_cluster_name }}
